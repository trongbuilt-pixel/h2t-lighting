<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="site-title"></title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,500;0,700;1,300&family=Noto+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
</head>
<body>

<div id="app"></div>

<script src="content.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060c07;--bg2:#0c140d;--bg3:#111a12;
  --g:#3ecf6e;--g2:#62e08b;
  --gdim:rgba(62,207,110,0.10);--gborder:rgba(62,207,110,0.22);
  --text:#dde9dd;--text2:#7a9c7a;--text3:#3a503a;
  --border:rgba(255,255,255,0.07);
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:22px;
  --serif:'Noto Serif',Georgia,serif;
  --sans:'Be Vietnam Pro',sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:17px;line-height:1.7;overflow-x:hidden;}
::selection{background:var(--g);color:#000;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-size:200px;pointer-events:none;z-index:999;opacity:.6;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 4rem;background:rgba(6,12,7,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:.9rem;text-decoration:none;}
.nav-logo-mark,.foot-logo-mark{display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;padding:0;background:transparent;border:none;}
.nav-logo-mark{width:78px;height:52px;border-radius:var(--radius-md);}
.foot-logo-mark{width:96px;height:64px;border-radius:var(--radius-md);}
.nav-logo-mark img,.foot-logo-mark img{width:100%;height:100%;object-fit:contain;display:block;background:transparent;mix-blend-mode:normal;filter:none;}
.nav-logo-fallback,.foot-logo-fallback{font-weight:700;letter-spacing:.08em;color:var(--g);}
.nav-logo-fallback{font-size:.8rem;}
.foot-logo-fallback{font-size:.85rem;}
.nav-logo-copy{display:flex;flex-direction:column;gap:.1rem;}
.nav-brand{font-weight:700;font-size:1.05rem;color:var(--g);letter-spacing:.05em;}
.nav-sub{font-size:.8rem;color:var(--text2);font-weight:300;letter-spacing:.12em;text-transform:uppercase;}
.nav-links{list-style:none;display:flex;align-items:center;gap:2.5rem;}
.nav-links a{text-decoration:none;font-size:15px;font-weight:500;color:var(--text2);transition:color .2s;}
.nav-links a:hover{color:var(--g);}
.nav-actions{display:flex;align-items:center;gap:1rem;}
.lang-switch{display:inline-flex;align-items:center;gap:.25rem;padding:.25rem;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.02);}
.lang-switch button{appearance:none;border:none;background:transparent;color:var(--text2);padding:.4rem .8rem;border-radius:999px;font:inherit;font-size:12px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:background .2s,color .2s;}
.lang-switch button:hover{color:var(--text);}
.lang-switch button.is-active{background:var(--g);color:#040904;}
.nav-cta{background:var(--gdim)!important;color:var(--g)!important;border:1px solid var(--gborder)!important;padding:.45rem 1.2rem!important;border-radius:999px!important;}
.nav-toggle{display:none;align-items:center;justify-content:center;width:46px;height:46px;background:transparent;border:1px solid var(--border);color:var(--text);cursor:pointer;border-radius:var(--radius-sm);transition:border-color .2s,color .2s,background .2s;}
.nav-toggle:hover{border-color:var(--gborder);color:var(--g);background:var(--gdim);}
.nav-toggle svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;}
.mobile-nav{display:none;position:fixed;top:79px;left:1rem;right:1rem;z-index:199;background:rgba(12,20,13,.96);border:1px solid var(--border);backdrop-filter:blur(16px);padding:1rem;border-radius:var(--radius-lg);overflow:hidden;}
.mobile-nav.is-open{display:block;}
.mobile-nav a{display:block;padding:1rem;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text);font-size:16px;font-weight:500;}
.mobile-nav a:last-child{border-bottom:none;}
.mobile-nav a:hover{color:var(--g);background:rgba(62,207,110,.05);}
.mobile-lang-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:.9rem;}
.mobile-nav .lang-switch{width:max-content;margin-bottom:1rem;}
body.nav-open{overflow:hidden;}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;font-family:var(--sans);font-size:15px;font-weight:500;padding:.85rem 1.8rem;border-radius:999px;cursor:pointer;border:none;transition:all .2s;}
.btn-g{background:var(--g);color:#040904;}
.btn-g:hover{background:var(--g2);transform:translateY(-1px);}
.btn-o{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-o:hover{border-color:var(--gborder);color:var(--g);}

/* HERO */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:0 4rem;padding-top:5rem;position:relative;overflow:hidden;gap:4rem;}
.hero::before{content:'';position:absolute;width:900px;height:900px;border-radius:50%;background:radial-gradient(circle,rgba(62,207,110,.06) 0%,transparent 65%);right:-200px;top:50%;transform:translateY(-50%);pointer-events:none;}
.hero-badge{display:inline-flex;align-items:center;gap:.5rem;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--g);margin-bottom:1.8rem;}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-family:var(--serif);font-weight:400;font-size:clamp(3rem,5.5vw,5.2rem);line-height:1.05;color:var(--text);margin-bottom:1.6rem;}
.hero h1 em{font-style:italic;color:var(--g);}
.hero-sub{font-size:17px;color:var(--text2);line-height:1.9;max-width:440px;margin-bottom:2.8rem;font-weight:300;}
.hero-actions{display:flex;gap:1rem;align-items:center;}
.hero-grid{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);animation:fu .8s .3s both;border-radius:var(--radius-lg);overflow:hidden;}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hcard{background:var(--bg2);padding:1.35rem 1.5rem;position:relative;overflow:hidden;transition:background .2s;display:grid;grid-template-columns:56px 56px minmax(0,1fr);gap:1rem;align-items:center;}
.hcard:hover{background:var(--bg3);}
.hcard-num{font-size:16px;color:var(--text3);letter-spacing:.1em;font-weight:700;margin:0;align-self:start;padding-top:.15rem;}
.hcard-icon{font-size:2rem;margin:0;line-height:1;display:flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:var(--radius-sm);background:var(--gdim);border:1px solid var(--gborder);}
.hcard-copy{min-width:0;}
.hcard-name{font-weight:700;font-size:1.3rem;color:var(--text);margin:0 0 .25rem;}
.hcard-desc{font-size:16px;color:var(--text2);line-height:1.6;font-weight:300;margin:0;overflow:visible;}
.hcard-line{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--g),transparent);transform:scaleX(0);transform-origin:left;transition:transform .35s;}
.hcard:hover .hcard-line{transform:scaleX(1);}

/* STATS */
.statsbar{background:var(--bg2);border:1px solid var(--border);padding:2rem 4rem;display:grid;grid-template-columns:repeat(3,1fr);position:relative;z-index:1;border-radius:var(--radius-lg);overflow:hidden;margin:0 4rem;}
.stat{text-align:center;border-right:1px solid var(--border);padding:.5rem 1rem;}
.stat:last-child{border-right:none;}
.stat-num{font-family:var(--serif);font-size:2.4rem;color:var(--g);font-weight:400;line-height:1;margin-bottom:.4rem;display:block;}
.stat-lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text2);font-weight:500;}

/* SECTION */
section{position:relative;z-index:1;}
.wrap{padding:7rem 4rem;}
.chip{display:inline-flex;align-items:center;gap:.5rem;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--g);background:var(--gdim);border:1px solid var(--gborder);padding:4px 14px;border-radius:100px;margin-bottom:1.5rem;}
.sec-h{font-family:var(--serif);font-weight:400;font-size:clamp(2rem,3.5vw,3rem);line-height:1.1;color:var(--text);margin-bottom:1rem;}
.sec-h em{font-style:italic;color:var(--g);}
.sec-p{font-size:16px;color:var(--text2);line-height:1.9;max-width:520px;font-weight:300;}
.bg2{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}

/* SERVICES */
.svc-header{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:end;margin-bottom:4rem;}
.svc-grid{display:grid;grid-template-columns:1fr;gap:1.5rem;}
.svc-card{display:grid;grid-template-columns:minmax(260px,360px) 1fr;gap:2rem;border:1px solid var(--border);padding:1.35rem;background:var(--bg2);position:relative;overflow:hidden;transition:border-color .25s,background .25s,transform .25s;align-items:stretch;border-radius:var(--radius-lg);}
.svc-card:hover{border-color:var(--gborder);background:var(--bg3);transform:translateY(-4px);}
.svc-media{position:relative;width:100%;height:100%;min-height:260px;border:1px solid var(--border);background:linear-gradient(135deg,rgba(62,207,110,.09),rgba(62,207,110,.02) 55%,rgba(255,255,255,.03));display:flex;align-items:center;justify-content:center;overflow:hidden;justify-self:stretch;align-self:stretch;border-radius:var(--radius-md);}
.svc-media::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(62,207,110,.15),transparent 45%);pointer-events:none;}
.svc-media img{width:100%;height:100%;object-fit:cover;object-position:center center;display:block;background:transparent;}
.svc-placeholder{position:absolute;inset:0;z-index:1;display:block;}
.svc-placeholder-label,.svc-placeholder-note{display:none;}
.svc-copy{display:flex;flex-direction:column;justify-content:center;padding:.4rem 0;}
.svc-head{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.svc-no{font-size:18px;letter-spacing:.2em;color:var(--text3);font-weight:700;}
.svc-icon{width:56px;height:56px;background:var(--gdim);border:1px solid var(--gborder);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;transition:background .2s;}
.svc-card:hover .svc-icon{background:rgba(62,207,110,.2);}
.svc-icon svg{width:22px;height:22px;stroke:var(--g);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.svc-name{font-weight:700;font-size:1.8rem;color:var(--text);margin-bottom:.7rem;}
.svc-desc{font-size:22px;color:var(--text2);line-height:1.8;font-weight:300;margin-bottom:1.8rem;}
.svc-tags{display:flex;flex-wrap:wrap;gap:.4rem;}
.svc-tag{font-size:15px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border);color:var(--text3);border-radius:999px;}
.svc-card:hover .svc-tag{border-color:rgba(62,207,110,.15);color:var(--text2);}

/* PORTFOLIO */
.portfolio-header{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:end;margin-bottom:3rem;}
.portfolio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
.portfolio-card{border:1px solid var(--border);background:var(--bg2);overflow:hidden;transition:border-color .25s,transform .25s,background .25s;border-radius:var(--radius-lg);}
.portfolio-card:hover{border-color:var(--gborder);transform:translateY(-4px);background:var(--bg3);}
.portfolio-media{aspect-ratio:4/3;background:linear-gradient(135deg,rgba(62,207,110,.10),rgba(62,207,110,.03) 55%,rgba(255,255,255,.04));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border-radius:var(--radius-md);}
.portfolio-media::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(62,207,110,.15),transparent 42%);pointer-events:none;}
.portfolio-media img{width:100%;height:100%;object-fit:cover;object-position:center center;display:block;background:transparent;}
.portfolio-placeholder{position:absolute;inset:0;z-index:1;display:block;}
.portfolio-placeholder-label,.portfolio-placeholder-note{display:none;}
.portfolio-copy{padding:1.25rem 1.25rem 1.4rem;}
.portfolio-meta{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin-bottom:.65rem;}
.portfolio-title{font-size:1.15rem;font-weight:700;color:var(--text);}

/* TOOLS */
.tools-header{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:end;margin-bottom:3.5rem;}
.tools-inline-list{display:flex;gap:2.5rem;align-items:center;justify-content:flex-start;flex-wrap:wrap;margin-bottom:1.5rem;}
.tool-inline{display:flex;flex-direction:column;align-items:center;gap:.7rem;min-width:90px;}
.tool-logo{width:44px;height:44px;min-width:44px;border-radius:12px;background:var(--bg3);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:border-color .2s;}
.tool-logo-large{width:100px;height:100px;min-width:100px;}
.tool-logo img{width:90%;height:90%;object-fit:contain;}
.tool-meta{display:flex;flex-direction:column;align-items:center;gap:.1rem;}
.tool-name{font-size:17px;font-weight:700;color:var(--text);margin-top:.2rem;}
.tool-type{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);}
.tools-note{margin-top:1rem;font-size:12px;color:var(--text3);font-style:italic;text-align:center;font-family:var(--serif);}

/* ABOUT */
.about-inner{display:grid;grid-template-columns:1.1fr 1fr;gap:6rem;align-items:center;}
.values{display:flex;flex-direction:column;gap:1px;margin-top:2.5rem;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.val{display:grid;grid-template-columns:2rem 1fr;gap:1.2rem;align-items:start;padding:1.2rem 1.5rem;background:var(--bg2);border-bottom:1px solid var(--border);transition:background .2s;}
.val:last-child{border-bottom:none;}
.val:hover{background:var(--bg3);}
.val-icon{color:var(--g);font-size:1rem;line-height:1.9;}
.val-title{font-weight:700;font-size:16px;color:var(--text);margin-bottom:2px;}
.val-desc{font-size:14px;color:var(--text2);line-height:1.7;font-weight:300;}
.about-box{background:var(--bg2);border:1px solid var(--border);padding:2.5rem;position:relative;overflow:hidden;margin-bottom:2rem;border-radius:var(--radius-lg);}
.about-box::before{content:'LIGHT\ACRAFT\ACODE';white-space:pre;font-family:var(--serif);font-size:4.5rem;line-height:1.05;color:rgba(62,207,110,.04);position:absolute;bottom:-.5rem;right:1rem;pointer-events:none;}
.team-row{display:flex;align-items:center;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border);}
.team-row:last-child{border-bottom:none;}
.team-photo{width:200px;height:200px;max-width:200px;max-height:200px;border-radius:50%;background:var(--gdim);border:1.5px solid var(--gborder);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.team-photo img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;}
.team-av{width:40px;height:40px;border-radius:50%;background:var(--gdim);border:1px solid var(--gborder);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--g);flex-shrink:0;}
.team-name{font-weight:500;font-size:16px;color:var(--text);}
.team-role{font-size:14px;color:var(--text2);font-weight:300;}
.team-subrole{font-size:13px;color:var(--g);font-weight:500;letter-spacing:.04em;margin-top:.15rem;}
.team-badge{margin-left:auto;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;background:var(--gdim);color:var(--g);border-radius:999px;}

/* WHY */
.why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;margin-top:3.5rem;}
.why-card{padding:2rem;border:1px solid var(--border);background:var(--bg);border-radius:var(--radius-lg);transition:border-color .2s,transform .2s;}
.why-card:hover{border-color:var(--gborder);transform:translateY(-3px);}
.why-num{font-family:var(--serif);font-size:2.5rem;color:var(--g);line-height:1;margin-bottom:1rem;opacity:.7;}
.why-title{font-weight:700;font-size:17px;color:var(--text);margin-bottom:.6rem;}
.why-desc{font-size:15px;color:var(--text2);line-height:1.8;font-weight:300;}

/* CONTACT */
.contact-inner{display:grid;grid-template-columns:1fr 1.2fr;gap:6rem;align-items:start;}
.channels{display:flex;flex-direction:column;gap:1px;margin-top:2.5rem;}
.channel{display:flex;align-items:center;gap:1.2rem;padding:1.2rem 1.5rem;background:var(--bg2);border:1px solid var(--border);border-bottom:none;text-decoration:none;transition:background .2s,border-color .2s;}
.channel:last-child{border-bottom:1px solid var(--border);}
.channel:first-child{border-top-left-radius:var(--radius-lg);border-top-right-radius:var(--radius-lg);}
.channel:last-child{border-bottom-left-radius:var(--radius-lg);border-bottom-right-radius:var(--radius-lg);}
.channel:hover{background:var(--bg3);border-color:var(--gborder);}
.ch-icon{width:36px;height:36px;border-radius:var(--radius-sm);background:var(--gdim);border:1px solid var(--gborder);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ch-icon svg{width:16px;height:16px;stroke:var(--g);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.ch-lbl{font-size:12px;color:var(--text2);margin-bottom:1px;}
.ch-val{font-size:16px;font-weight:500;color:var(--text);}
.ch-arr{margin-left:auto;color:var(--text3);font-size:14px;transition:color .2s;}
.channel:hover .ch-arr{color:var(--g);}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:3rem 4rem;display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;gap:2rem;position:relative;z-index:1;}
.foot-brand{display:flex;align-items:center;gap:1rem;}
.foot-name{font-weight:700;font-size:1.1rem;color:var(--g);letter-spacing:.05em;}
.foot-sub{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text2);font-weight:300;margin-top:2px;}
.foot-copy{font-size:14px;color:var(--text3);text-align:center;}
.foot-links{display:flex;justify-content:flex-end;gap:2rem;}
.foot-links a{font-size:14px;color:var(--text2);text-decoration:none;font-weight:500;transition:color .2s;}
.foot-links a:hover{color:var(--g);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:rgba(62,207,110,.3);}

@media(max-width:1024px){
  nav{padding:1rem 2rem;}
  .nav-links{display:none;}
  .nav-actions{gap:.75rem;}
  .nav-toggle{display:inline-flex;}
  .nav-logo-mark{width:70px;height:46px;}
  .hero{grid-template-columns:1fr;padding:8rem 2rem 4rem;gap:3rem;min-height:auto;}
  .hero::before{display:none;}
  .statsbar{padding:2rem;grid-template-columns:1fr 1fr;}
  .wrap{padding:5rem 2rem;}
  .svc-header,.portfolio-header,.tools-header{grid-template-columns:1fr;gap:1.5rem;}
  .svc-card{grid-template-columns:minmax(220px,300px) 1fr;gap:1.5rem;}
  .portfolio-grid{grid-template-columns:1fr 1fr;}
  .tools-inline-list{gap:1.5rem;}
  .about-inner,.contact-inner{grid-template-columns:1fr;gap:3rem;}
  .why-grid{grid-template-columns:1fr 1fr;}
  footer{grid-template-columns:1fr;text-align:center;}
  .foot-brand{justify-content:center;}
  .foot-links{justify-content:center;}
}
@media(max-width:600px){
  nav{padding:.85rem 1rem;}
  .mobile-nav{top:72px;left:.75rem;right:.75rem;}
  .nav-logo{gap:.65rem;max-width:calc(100% - 58px);}
  .nav-logo-mark{width:60px;height:40px;}
  .nav-brand{font-size:.95rem;}
  .nav-sub{font-size:.7rem;letter-spacing:.1em;}
  .nav-actions{gap:.5rem;}
  .lang-switch{padding:.2rem;}
  .lang-switch button{padding:.35rem .65rem;font-size:11px;}
  .hero{padding:7rem 1rem 3rem;gap:2rem;}
  .hero h1{font-size:2.5rem;}
  .hero-actions{flex-direction:column;align-items:stretch;}
  .hero-actions .btn{justify-content:center;width:100%;}
  .statsbar{grid-template-columns:1fr;padding:1.5rem 1rem;}
  .stat{border-right:none;border-bottom:1px solid var(--border);padding:1rem 0;}
  .stat:last-child{border-bottom:none;}
  .wrap{padding:4rem 1rem;}
  .sec-h{font-size:2rem;}
  .hcard{grid-template-columns:44px 48px minmax(0,1fr);padding:1rem;gap:.8rem;}
  .hcard-icon{width:48px;height:48px;font-size:1.5rem;}
  .hcard-name{font-size:1.05rem;}
  .hcard-desc{font-size:14px;}
  .svc-grid,.why-grid{grid-template-columns:1fr;}
  .svc-card{grid-template-columns:1fr;padding:1rem;}
  .svc-media{min-height:220px;height:auto;}
  .svc-head{gap:.8rem;margin-bottom:1rem;}
  .portfolio-grid{grid-template-columns:1fr;}
  .tools-inline-list{justify-content:center;gap:1rem;}
  .tool-inline{min-width:84px;}
  .about-box{padding:1.4rem;}
  .team-photo{width:120px;height:120px;max-width:120px;max-height:120px;}
  .team-row{align-items:flex-start;}
  .team-badge{display:none;}
  .channel{padding:1rem;gap:.9rem;}
  .ch-val{font-size:15px;word-break:break-word;}
  footer{padding:2rem 1rem;gap:1.5rem;}
  .foot-brand{flex-direction:column;}
  .foot-links{flex-wrap:wrap;gap:1rem 1.5rem;}
}
</style>

<script>
// ── BUILD PAGE ──────────────────────────────────────────────────────────────
const CONTENT = window.H2T_CONTENT || {};
const DEFAULT_LOCALE = 'en';
const LOCALE_STORAGE_KEY = 'h2t-locale';
const e = s => (s == null ? '' : String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const svcSVG = [
  `<svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>`,
  `<svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
  `<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/></svg>`,
  `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>`,
  `<svg viewBox="0 0 24 24"><path d="M4 19.5V5a2 2 0 0 1 2-2h8l6 6v10.5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><path d="M14 3v6h6"/><path d="M8 13h8"/><path d="M8 17h5"/></svg>`,
];
const heroIcons = ['✦','◈','⬡','▶','◎'];
const renderImageSlot = (image, alt, placeholderClass, placeholderLabelClass, placeholderLabel, placeholderNoteClass, placeholderNote) => image
  ? `<img src="${e(image)}" alt="${e(alt)}" onerror="this.hidden=true;this.nextElementSibling.hidden=false"><div class="${placeholderClass}" hidden><span class="${placeholderLabelClass}">${e(placeholderLabel)}</span><p class="${placeholderNoteClass}">${e(placeholderNote)}</p></div>`
  : `<div class="${placeholderClass}"><span class="${placeholderLabelClass}">${e(placeholderLabel)}</span><p class="${placeholderNoteClass}">${e(placeholderNote)}</p></div>`;

const app = document.getElementById('app');

function getInitialLocale() {
  if (!CONTENT.en) return DEFAULT_LOCALE;
  try {
    const savedLocale = localStorage.getItem(LOCALE_STORAGE_KEY);
    return CONTENT[savedLocale] ? savedLocale : DEFAULT_LOCALE;
  } catch {
    return DEFAULT_LOCALE;
  }
}

function renderLocaleSwitch(locale) {
  return `<div class="lang-switch" aria-label="Language switcher">
    <button type="button" data-locale="en" class="${locale === 'en' ? 'is-active' : ''}">EN</button>
    <button type="button" data-locale="vi" class="${locale === 'vi' ? 'is-active' : ''}">VI</button>
  </div>`;
}

function bindInteractions(locale) {
  const navToggle = document.getElementById('nav-toggle');
  const mobileNav = document.getElementById('mobile-nav');

  if (navToggle && mobileNav) {
    const closeMobileNav = () => {
      mobileNav.classList.remove('is-open');
      navToggle.setAttribute('aria-expanded', 'false');
      document.body.classList.remove('nav-open');
    };

    navToggle.addEventListener('click', () => {
      const isOpen = mobileNav.classList.toggle('is-open');
      navToggle.setAttribute('aria-expanded', String(isOpen));
      document.body.classList.toggle('nav-open', isOpen);
    });

    mobileNav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', closeMobileNav);
    });

    window.onresize = () => {
      if (window.innerWidth > 1024) closeMobileNav();
    };
  }

  document.querySelectorAll('[data-locale]').forEach(button => {
    button.addEventListener('click', () => {
      const nextLocale = button.getAttribute('data-locale');
      if (!nextLocale || nextLocale === locale || !CONTENT[nextLocale]) return;
      try {
        localStorage.setItem(LOCALE_STORAGE_KEY, nextLocale);
      } catch {}
      renderPage(nextLocale);
    });
  });
}

function renderPage(locale) {
  if (!CONTENT.en) {
    app.innerHTML = '<p style="padding:2rem 1rem;color:#dde9dd;font-family:DM Sans,sans-serif">Content file is missing or failed to load.</p>';
    return;
  }
  const currentLocale = CONTENT[locale] ? locale : DEFAULT_LOCALE;
  const C = CONTENT[currentLocale];
  const brandLogo = C.brand.logo ? `<img src="${e(C.brand.logo)}" alt="${e(C.brand.logoAlt || C.brand.name)}">` : '';
  const brandFallback = `<span class="nav-logo-fallback">${e(C.brand.name)}</span>`;
  const footerFallback = `<span class="foot-logo-fallback">${e(C.brand.name)}</span>`;

  document.documentElement.lang = currentLocale;
  document.getElementById('site-title').textContent = C.brand.title;

  app.innerHTML = `

<nav>
  <a href="#" class="nav-logo">
    <span class="nav-logo-mark">${brandLogo || brandFallback}</span>
    <span class="nav-logo-copy">
      <span class="nav-brand">${e(C.brand.name)}</span>
      <span class="nav-sub">${e(C.brand.service)}</span>
    </span>
  </a>
  <ul class="nav-links">
    <li><a href="#about">${e(C.nav.menu1)}</a></li>
    <li><a href="#services">${e(C.nav.menu2)}</a></li>
    <li><a href="#portfolio">${e(C.nav.menu3)}</a></li>
    <li><a href="#tools">${e(C.nav.menu4)}</a></li>
    <li><a href="#contact" class="nav-cta">${e(C.nav.cta)}</a></li>
  </ul>
  <div class="nav-actions">
    ${renderLocaleSwitch(currentLocale)}
    <button class="nav-toggle" id="nav-toggle" type="button" aria-label="${e(C.nav.openMenu)}" aria-expanded="false" aria-controls="mobile-nav">
      <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
  </div>
</nav>

<div class="mobile-nav" id="mobile-nav">
  <p class="mobile-lang-label">${e(C.labels.localeLabel)}</p>
  ${renderLocaleSwitch(currentLocale)}
  <a href="#about">${e(C.nav.menu1)}</a>
  <a href="#services">${e(C.nav.menu2)}</a>
  <a href="#portfolio">${e(C.nav.menu3)}</a>
  <a href="#tools">${e(C.nav.menu4)}</a>
  <a href="#contact">${e(C.nav.cta)}</a>
</div>

<!-- HERO -->
<section>
  <div class="hero">
    <div>
      <div class="hero-badge"><span class="badge-dot"></span>${e(C.brand.badge)}</div>
      <h1>${e(C.hero.line1)}<br><em>${e(C.hero.lineGreen)}</em><br>${e(C.hero.line3)}</h1>
      <p class="hero-sub">${e(C.hero.sub)}</p>
      <div class="hero-actions">
        <a href="#services" class="btn btn-g">${e(C.hero.btn1)}</a>
        <a href="#contact"  class="btn btn-o">${e(C.hero.btn2)}</a>
      </div>
    </div>
    <div class="hero-grid">
      ${C.services.map((s,i)=>`
        <div class="hcard">
          <p class="hcard-num">0${i+1}</p>
          <div class="hcard-icon">${heroIcons[i]}</div>
          <div class="hcard-copy">
            <p class="hcard-name">${e(s.name)}</p>
            <p class="hcard-desc">${e(s.desc)}</p>
          </div>
          <div class="hcard-line"></div>
        </div>`).join('')}
    </div>
  </div>
</section>

<!-- STATS -->
<div class="statsbar">
  ${C.stats.map(s=>`
    <div class="stat">
      <span class="stat-num">${e(s.num)}</span>
      <span class="stat-lbl">${e(s.label)}</span>
    </div>`).join('')}
</div>

<!-- SERVICES -->
<section id="services">
  <div class="wrap">
    <div class="svc-header">
      <div>
        <span class="chip">${e(C.labels.servicesChip)}</span>
        <h2 class="sec-h">${e(C.labels.servicesTitleLine1)}<br>${e(C.labels.servicesTitleLine3).replace(e(C.labels.servicesTitleAccent), `<em>${e(C.labels.servicesTitleAccent)}</em>`)}</h2>
      </div>
      <p class="sec-p">${e(C.labels.servicesDesc)}</p>
    </div>
    <div class="svc-grid">
      ${C.services.map((s,i)=>`
        <div class="svc-card">
          <div class="svc-media"${s.mediaScale ? ` style="width:${Number(s.mediaScale) * 100}%;min-height:${Math.round(260 * Number(s.mediaScale))}px;justify-self:center;align-self:center;"` : ''}>
            ${s.image ? `<img src="${e(s.image)}" alt="${e(s.imageAlt || s.name)}">` : `<div class="svc-placeholder"></div>`}
          </div>
          <div class="svc-copy">
            <div class="svc-head">
              <p class="svc-no">0${i+1}</p>
              <div class="svc-icon">${svcSVG[i]}</div>
            </div>
            <p class="svc-name">${e(s.name)}</p>
            <p class="svc-desc">${e(s.desc)}</p>
            <div class="svc-tags">${s.tags.map(t=>`<span class="svc-tag">${e(t)}</span>`).join('')}</div>
          </div>
        </div>`).join('')}
    </div>
  </div>
</section>

<!-- PORTFOLIO -->
<section id="portfolio" class="bg2">
  <div class="wrap">
    <div class="portfolio-header">
      <div>
        <span class="chip">${e(C.labels.portfolioChip)}</span>
        <h2 class="sec-h">${e(C.portfolio.title)}<br><em>${e(C.portfolio.titleAccent)}</em></h2>
      </div>
      <p class="sec-p">${e(C.portfolio.desc)}</p>
    </div>
    <div class="portfolio-grid">
      ${C.portfolio.items.map(item => `
        <article class="portfolio-card">
          <div class="portfolio-media">
            ${renderImageSlot(item.image, item.imageAlt || item.title, 'portfolio-placeholder', 'portfolio-placeholder-label', '', 'portfolio-placeholder-note', '')}
          </div>
          <div class="portfolio-copy">
            <p class="portfolio-meta">${e(item.meta)}</p>
            <p class="portfolio-title">${e(item.title)}</p>
          </div>
        </article>`).join('')}
    </div>
  </div>
</section>

<!-- TOOLS -->
<section id="tools" class="bg2">
  <div class="wrap">
    <div class="tools-header">
      <div>
        <span class="chip">${e(C.labels.toolsChip)}</span>
        <h2 class="sec-h">${e(C.labels.toolsTitleLine1)}<br><em>${e(C.labels.toolsTitleAccent)}</em></h2>
      </div>
      <p class="sec-p">${e(C.labels.toolsDesc)}</p>
    </div>
    <div class="tools-inline-list">
      ${C.tools.map(t=>`
        <div class="tool-inline">
          <div class="tool-logo tool-logo-large"><img src="${e(t.logo)}" alt="${e(t.name)}"></div>
          <div class="tool-meta">
            <span class="tool-name">${e(t.name)}</span>
            ${t.type ? `<span class="tool-type">${e(t.type)}</span>` : ''}
          </div>
        </div>`).join('')}
    </div>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="wrap">
    <div class="about-inner">
      <div>
        <span class="chip">${e(C.labels.aboutChip)}</span>
        <h2 class="sec-h">${e(C.about.titleLine1)}<br><em>${e(C.about.titleGreen)}</em><br>${e(C.about.titleLine3)}</h2>
        <p class="sec-p" style="margin-bottom:0">${e(C.about.body)}</p>
        <div class="values">
          ${C.about.values.map(v=>`
            <div class="val">
              <span class="val-icon">${e(v.icon)}</span>
              <div>
                <p class="val-title">${e(v.title)}</p>
                <p class="val-desc">${e(v.desc)}</p>
              </div>
            </div>`).join('')}
        </div>
      </div>
      <div>
        <div class="about-box">
          <p style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--text2);margin-bottom:1.5rem;font-weight:500">${e(C.labels.teamHeading)}</p>
          ${C.about.team.map(t=>`
            <div class="team-row">
              <div class="team-photo">
                <img src="${e(t.photo)}" alt="${e(t.name)}" />
              </div>
              <div>
                <p class="team-name">${e(t.name)}</p>
                <p class="team-role">${e(t.role)}</p>
                ${t.subrole ? `<p class="team-subrole">${e(t.subrole)}</p>` : ''}
              </div>
              <span class="team-badge">H2T</span>
            </div>`).join('')}
        </div>
      </div>
    </div>
  </div>
</section>

<!-- WHY -->
<section id="why" class="bg2">
  <div class="wrap">
    <div style="text-align:center;max-width:560px;margin:0 auto">
      <span class="chip">${e(C.labels.whyChip)}</span>
      <h2 class="sec-h">${e(C.labels.whyTitleLine1)}<br><em>${e(C.labels.whyTitleAccent)}</em> ${e(C.labels.whyTitleLine3)}</h2>
    </div>
    <div class="why-grid">
      ${C.why.map((w,i)=>`
        <div class="why-card">
          <div class="why-num">0${i+1}</div>
          <p class="why-title">${e(w.title)}</p>
          <p class="why-desc">${e(w.desc)}</p>
        </div>`).join('')}
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="wrap">
    <div class="contact-inner">
      <div style="max-width:760px;">
        <span class="chip">${e(C.labels.contactChip)}</span>
        <h2 class="sec-h">${e(C.contact.titleLine1)}<br><em>${e(C.contact.titleGreen)}</em><br>${e(C.contact.titleLine3)}</h2>
        <p class="sec-p" style="margin-bottom:2.5rem">${e(C.contact.desc)}</p>
        <div class="channels">
          <a href="mailto:${e(C.contact.email)}" class="channel">
            <div class="ch-icon"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
            <div><p class="ch-lbl">${e(C.labels.emailLabel)}</p><p class="ch-val">${e(C.contact.email)}</p></div>
            <span class="ch-arr">→</span>
          </a>
          <a href="tel:${e(C.contact.phone)}" class="channel">
            <div class="ch-icon"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.19 2.22 2 2 0 012.17 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.29 6.29l1.27-.5a2 2 0 012.11.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></div>
            <div><p class="ch-lbl">${e(C.labels.phoneLabel)}</p><p class="ch-val">${e(C.contact.phone)}</p></div>
            <span class="ch-arr">→</span>
          </a>
          <a href="${e(C.contact.facebook)}" class="channel" target="_blank" rel="noreferrer">
            <div class="ch-icon"><svg viewBox="0 0 24 24"><path d="M21 2H3v16h5v4l4-4h5l4-4V2z"/></svg></div>
            <div><p class="ch-lbl">${e(C.labels.facebookLabel)}</p><p class="ch-val">${e(C.contact.facebook)}</p></div>
            <span class="ch-arr">→</span>
          </a>
          <a href="https://www.instagram.com/${e(C.contact.instagram).replace('@','')}" class="channel" target="_blank" rel="noreferrer">
            <div class="ch-icon"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></div>
            <div><p class="ch-lbl">${e(C.labels.instagramLabel)}</p><p class="ch-val">${e(C.contact.instagram)}</p></div>
            <span class="ch-arr">→</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="foot-brand">
    <span class="foot-logo-mark">${brandLogo || footerFallback}</span>
    <div>
      <p class="foot-name">${e(C.brand.name)}</p>
      <p class="foot-sub">${e(C.brand.service)}</p>
    </div>
  </div>
  <p class="foot-copy">${e(C.footer.copy)}</p>
  <div class="foot-links">
    <a href="#about">${e(C.nav.menu1)}</a>
    <a href="#services">${e(C.nav.menu2)}</a>
    <a href="#portfolio">${e(C.nav.menu3)}</a>
    <a href="#tools">${e(C.nav.menu4)}</a>
    <a href="#contact">${e(C.nav.cta)}</a>
  </div>
</footer>
  `;

  bindInteractions(currentLocale);
}

renderPage(getInitialLocale());

</script>

</body>
</html>
